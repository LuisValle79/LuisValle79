name: 🔄 Update GitHub Activity

on:
  schedule:
    - cron: "0 */6 * * *"  # Ejecuta cada 6 horas
  workflow_dispatch:

jobs:
  update-activity:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permite que el bot haga commits en el repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update recent GitHub activity
        uses: jamesgeorge007/github-activity-readme@v0.4.4
        with:
          GH_USERNAME: LuisValle79
          COMMIT_MSG: "🔁 Update recent GitHub activity"
          MAX_LINES: 5

      - name: Commit & push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "🔁 Auto-update GitHub activity [skip ci]" || echo "No changes to commit"
          git push
