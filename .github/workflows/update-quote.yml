name: 🧠 Update Quote of the Day

on:
  schedule:
    - cron: "0 6 * * *" # Cada mañana a las 6 AM UTC
  workflow_dispatch:

jobs:
  update-quote:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Refresh quote section
        run: |
          sed -i '/<!--START_SECTION:quote-->/,<!--END_SECTION:quote-->/{
          /<!--START_SECTION:quote-->/!{/<!--END_SECTION:quote-->/!d;}
          /<!--START_SECTION:quote-->/a ![Quote](https://quotes-github-readme.vercel.app/api?type=horizontal&theme=tokyonight)
          }' README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add README.md
          git commit -m "💬 Update quote of the day" || echo "No changes to commit"
          git push
